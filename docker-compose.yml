services:
  api:
    build: .
    ports:
      - "8222:8222"
    volumes:
      - ./data:/data          # SQLite + session store
      - ./music:/music        # shared music library (change to /storage/media/Music for production)
    env_file: .env
    depends_on:
      - redis
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8222
    restart: unless-stopped

  worker:
    build: .
    volumes:
      - ./data:/data
      - ./music:/music        # shared music library (change to /storage/media/Music for production)
    env_file: .env
    depends_on:
      - redis
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
volumes:
  redis-data:
